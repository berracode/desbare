name: Build and Release Desktop Portable

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Portable Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package with Maven
        run: mvn clean package -DskipTests

      - name: Compress App Image to Zip
        shell: powershell
        run: |
          # 1. Leer el archivo pom.xml completo
          $pomContent = Get-Content pom.xml -Raw
          
          # 2. Extraer la versión de la cabecera usando Regex
          if ($pomContent -match '<version>\s*([^<]+?)\s*</version>') {
              $version = $Matches[1].Trim()
          } else {
              $version = "ERR.0.0"
          }
          
          # 3. Extraer el artifactId para nombrar el archivo exactamente igual a Maven
          if ($pomContent -match '<artifactId>\s*([^<]+?)\s*</artifactId>') {
              $artifactId = $Matches[1].Trim()
          } else {
              $artifactId = "desvar-app"
          }
          
          # Nombre esperado del archivo: desvar-app-1.0.0-win-portable.zip
          $zipName = "$artifactId-$version-win-portable.zip"
          
          Write-Host "[INFO] ArtifactId detectado: $artifactId"
          Write-Host "[INFO] Versión detectada: $version"
          
          # 4. jpackage ahora genera la carpeta 'DesvarApp' según tu propiedad --name
          $appImagePath = "target/dist/DesvarApp"
          
          if (Test-Path $appImagePath) {
              Write-Host "[INFO] Comprimiendo distribución portable desde $appImagePath hacia target/$zipName..."
              Compress-Archive -Path $appImagePath -DestinationPath "target/$zipName" -Force
              Write-Host "[SUCCESS] ¡Archivo ZIP creado con éxito!"
          } else {
              Write-Error "[ERROR] No se encontró la carpeta generada por jpackage en: $appImagePath"
              exit 1
          }

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}